---
- name: Bootstrap the host machine
  hosts: matrix
  become: true
  roles:
    - base_host
    - firewall
    - docker
    - datastores
    - matrix_base
    - matrix_mas
    - matrix_livekit
    - matrix_element_call
    - matrix_coturn
    - matrix_maubot
    - caddy
    - xui

- name: Black-box validation of deployed stack
  hosts: matrix
  gather_facts: true
  become: false
  roles:
    - stack_validate
