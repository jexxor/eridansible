[defaults]
inventory = inventories/inventory.yml
host_key_checking = false
remote_user = vagrant
roles_path = roles
local_tmp = .ansible/tmp

[ssh_connection]
pipelining = true
ssh_args = -F /dev/null -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_pass = false
