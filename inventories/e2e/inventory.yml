---
# Lab / E2E: single VM; nip.io in group_vars so DNS matches the VM without /etc/hosts.
# Override ansible_host / e2e_vm_ip together if your VM address differs.

all:
  children:
    matrix:
      hosts:
        vm-1:
          ansible_host: 192.168.10.100
          ansible_user: vagrant
          ansible_port: 22
          ansible_ssh_private_key_file: .vagrant/machines/default/libvirt/private_key
