---
- name: Ensure Caddy deployment directory exists
  ansible.builtin.file:
    path: "{{ caddy_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: caddy_enable | bool

- name: Ensure Caddy config directory exists
  ansible.builtin.file:
    path: "{{ caddy_root }}/caddy"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: caddy_enable | bool

- name: Render Caddy Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ caddy_root }}/{{ caddy_compose_filename }}"
    owner: root
    group: root
    mode: "0644"
  when: caddy_enable | bool

- name: Render Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_root }}/caddy/Caddyfile"
    owner: root
    group: root
    mode: "0644"
  when: caddy_enable | bool

- name: Bring Caddy up (docker-compose)
  ansible.builtin.command:
    cmd: "docker-compose -f {{ caddy_root }}/{{ caddy_compose_filename }} up -d"
    chdir: "{{ caddy_root }}"
  register: caddy_compose_up
  changed_when: >-
    ('Creating' in (caddy_compose_up.stdout ~ caddy_compose_up.stderr))
    or ('Recreating' in (caddy_compose_up.stdout ~ caddy_compose_up.stderr))
    or ('Starting' in (caddy_compose_up.stdout ~ caddy_compose_up.stderr))
  when: caddy_enable | bool
