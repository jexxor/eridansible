---
datastore_root: /opt/datastores
datastore_compose_filename: docker-compose.yml

datastore_postgres_image: postgres:16
datastore_redis_image: redis:7-alpine

datastore_postgres_user: app
datastore_postgres_db: app
datastore_postgres_password: ""

# Bind published ports (host:container). Use 127.0.0.1 for localhost-only.
datastore_postgres_host_port: "5432"
datastore_redis_host_port: "6379"

datastore_compose_pull_before_up: false
